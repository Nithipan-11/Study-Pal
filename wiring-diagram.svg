<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Study Pal wiring diagram</title>
<desc>Wiring diagram showing Arduino Uno connections to green LED on D8, red LED on D9, buzzer on D10, and OLED display on A4/A5.</desc>

<rect width="800" height="800" fill="#1a1a1a"/>

<text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="500" fill="#ffffff">Study Pal — Wiring Diagram</text>

<!-- Legend (top right, isolated, nothing crosses this box) -->
<rect x="560" y="70" width="200" height="160" rx="6" fill="#222222" stroke="#555555" stroke-width="1"/>
<text x="575" y="95" font-family="sans-serif" font-size="13" fill="#cccccc" font-weight="500">Legend</text>

<line x1="575" y1="120" x2="605" y2="120" stroke="#ff4444" stroke-width="3"/>
<text x="613" y="124" font-family="sans-serif" font-size="12" fill="#ff8888">5V power</text>

<line x1="575" y1="146" x2="605" y2="146" stroke="#4477ff" stroke-width="3"/>
<text x="613" y="150" font-family="sans-serif" font-size="12" fill="#88aaff">GND</text>

<line x1="575" y1="172" x2="605" y2="172" stroke="#22aa22" stroke-width="3"/>
<text x="613" y="176" font-family="sans-serif" font-size="12" fill="#88dd88">Signal / I2C SDA</text>

<line x1="575" y1="198" x2="605" y2="198" stroke="#ee9922" stroke-width="3"/>
<text x="613" y="202" font-family="sans-serif" font-size="12" fill="#ffcc77">I2C SCK</text>

<!-- Arduino Uno (left column) -->
<rect x="40" y="90" width="200" height="380" rx="8" fill="#1a8a62" stroke="#0d5c40" stroke-width="2"/>
<text x="140" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="500" fill="#ffffff">Arduino Uno</text>

<circle cx="240" cy="170" r="5" fill="#ffffff"/>
<text x="60" y="174" font-family="monospace" font-size="13" fill="#ffffff">D8</text>

<circle cx="240" cy="220" r="5" fill="#ffffff"/>
<text x="60" y="224" font-family="monospace" font-size="13" fill="#ffffff">D9</text>

<circle cx="240" cy="270" r="5" fill="#ffffff"/>
<text x="60" y="274" font-family="monospace" font-size="13" fill="#ffffff">D10</text>

<circle cx="240" cy="320" r="5" fill="#90e0c0"/>
<text x="60" y="324" font-family="monospace" font-size="13" fill="#90e0c0">A4 (SDA)</text>

<circle cx="240" cy="370" r="5" fill="#ffcc77"/>
<text x="60" y="374" font-family="monospace" font-size="13" fill="#ffcc77">A5 (SCK)</text>

<circle cx="240" cy="410" r="5" fill="#ff8888"/>
<text x="60" y="414" font-family="monospace" font-size="13" fill="#ff8888">5V</text>

<circle cx="240" cy="450" r="5" fill="#88aaff"/>
<text x="60" y="454" font-family="monospace" font-size="13" fill="#88aaff">GND</text>

<!-- Components column (middle) -->
<!-- Green LED -->
<ellipse cx="340" cy="170" rx="14" ry="18" fill="#44ee44" stroke="#228822" stroke-width="2"/>
<text x="340" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#004400">G</text>
<rect x="376" y="160" width="40" height="14" rx="3" fill="#fff8dc" stroke="#cc8800" stroke-width="1.5"/>
<text x="396" y="171" text-anchor="middle" font-family="monospace" font-size="11" fill="#664400">220Ω</text>
<path d="M240 170 L326 170" stroke="#22aa22" stroke-width="2" fill="none"/>
<path d="M340 188 L340 600" stroke="#4477ff" stroke-width="2" fill="none"/>
<text x="440" y="174" font-family="sans-serif" font-size="13" fill="#88dd88">Green LED — focused</text>

<!-- Red LED -->
<ellipse cx="340" cy="230" rx="14" ry="18" fill="#ff5555" stroke="#bb1111" stroke-width="2"/>
<text x="340" y="235" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#440000">R</text>
<rect x="376" y="220" width="40" height="14" rx="3" fill="#fff8dc" stroke="#cc8800" stroke-width="1.5"/>
<text x="396" y="231" text-anchor="middle" font-family="monospace" font-size="11" fill="#664400">220Ω</text>
<path d="M240 220 L274 222 L326 230" stroke="#ee2222" stroke-width="2" fill="none"/>
<path d="M340 248 L355 248 L355 600" stroke="#4477ff" stroke-width="2" fill="none"/>
<text x="440" y="234" font-family="sans-serif" font-size="13" fill="#ff9999">Red LED — distracted</text>

<!-- Buzzer -->
<rect x="325" y="280" width="40" height="32" rx="6" fill="#aa88ff" stroke="#5522cc" stroke-width="2"/>
<text x="345" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">BUZ</text>
<path d="M240 270 L280 285 L325 290" stroke="#8844ff" stroke-width="2" fill="none"/>
<path d="M345 312 L370 312 L370 600" stroke="#4477ff" stroke-width="2" fill="none"/>
<text x="440" y="300" font-family="sans-serif" font-size="13" fill="#cc99ff">Buzzer — audio alerts</text>

<!-- OLED (bottom, centered) -->
<rect x="300" y="600" width="180" height="100" rx="8" fill="#222244" stroke="#5566aa" stroke-width="2"/>
<rect x="318" y="615" width="144" height="70" rx="4" fill="#000000" stroke="#444477" stroke-width="1"/>
<text x="390" y="655" text-anchor="middle" font-family="monospace" font-size="14" fill="#88ddff">Study Pal</text>

<!-- 5V to OLED VCC -->
<path d="M240 410 L260 410 L260 590 L320 590 L320 600" stroke="#ff4444" stroke-width="2" fill="none"/>
<text x="180" y="585" font-family="sans-serif" font-size="11" fill="#ff8888">VCC ← 5V</text>

<!-- GND to OLED -->
<path d="M240 450 L290 450 L290 595 L345 595 L345 600" stroke="#4477ff" stroke-width="2" fill="none"/>
<text x="180" y="610" font-family="sans-serif" font-size="11" fill="#88aaff">GND</text>

<!-- A4 SDA to OLED, routed below the LEDs/buzzer column -->
<path d="M240 320 L500 320 L500 605 L462 605" stroke="#22aa22" stroke-width="2" fill="none"/>
<text x="500" y="450" font-family="sans-serif" font-size="11" fill="#88dd88" text-anchor="middle">SDA (A4)</text>

<!-- A5 SCK to OLED -->
<path d="M240 370 L530 370 L530 625 L462 625" stroke="#ee9922" stroke-width="2" fill="none"/>
<text x="530" y="490" font-family="sans-serif" font-size="11" fill="#ffcc77" text-anchor="middle">SCK (A5)</text>

<!-- OLED label -->
<text x="600" y="640" font-family="sans-serif" font-size="13" fill="#aaccff">1.3" SH1106 OLED</text>
<text x="600" y="660" font-family="sans-serif" font-size="11" fill="#999999">I2C address 0x3C</text>
<text x="600" y="678" font-family="sans-serif" font-size="11" fill="#999999">U8g2 library</text>

<!-- Power rails -->
<rect x="40" y="500" width="720" height="14" rx="3" fill="#ff4444"/>
<text x="50" y="540" font-family="sans-serif" font-size="13" fill="#ff8888">+5V rail</text>

<rect x="40" y="550" width="720" height="14" rx="3" fill="#4477ff"/>
<text x="50" y="590" font-family="sans-serif" font-size="13" fill="#88aaff">GND rail</text>

</svg>
